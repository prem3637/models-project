name: Deploy Frontend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 165.232.191.125
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/frontend
            git pull origin master
            npm install
            npm run build
